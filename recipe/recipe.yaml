schema_version: 1

context:
  name: connectorx
  version: "0.4.5"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  - url: https://github.com/sfu-db/connector-x/archive/refs/tags/v${{ version }}.tar.gz
    sha256: 619e8ff23f75a60604681a80cef94ed8d2458e4c235c7ad0d041a202ade2bd56

build:
  number: 0

requirements:
  build:
    - if: build_platform != target_platform
      then: 
        - python
        - cross-python_${{ target_platform }}
        - crossenv
        - maturin >=1.0,<2.0
    - ${{ compiler('c') }}
    - ${{ stdlib("c") }}
    - ${{ compiler('rust') }}
    - if: win
      then: posix
    - cmake
    - cargo-bundle-licenses
    - if: unix
      then:
        - libclang
        - clangdev
        - make
  host:
    - python
    - pip
    - poetry
    - maturin >=1.0,<2.0
    - if: linux
      then: krb5
    - openssl
    - zlib
  run:
    - python
    - numpy >=1.21.5

tests:
  - python:
      pip_check: true
      imports:
        - connectorx

about:
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: Fastest library to load data from DB to DataFrames in Rust and Python
  homepage: https://github.com/sfu-db/connector-x
  repository: https://github.com/sfu-db/connector-x

extra:
  recipe-maintainers:
    - 48762
    - timkpaine
    - wangxiaoying
    - xhochy
